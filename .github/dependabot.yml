version: 2

updates:
  # ── 套件相依（npm，對齊 package-lock.json）──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    labels: [dependencies, npm]
    groups:
      minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]

  # ── GitHub Actions（workflows 裡 uses 的 action）──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels: [dependencies, github-actions]
    groups:
      actions-all:
        patterns: ["*"]

  # ── Docker base image ──
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(docker)"
      include: scope
    labels: [dependencies, docker]
    # 禁止 base image major 升級（避免跳到非 LTS）；仍收 minor/patch 安全更新
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
