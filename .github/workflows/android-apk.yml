name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: ai-food-mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to S3
        if: ${{ env.S3_ENDPOINT != '' && env.S3_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
          APK_PATH: mobile/build/app/outputs/flutter-apk/app-release.apk
          RELEASE_NAME: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        run: |
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/downloads/ai-food-$RELEASE_NAME.apk" --endpoint-url "$S3_ENDPOINT"
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/downloads/ai-food-latest.apk" --endpoint-url "$S3_ENDPOINT"
