name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      # Gate for the signing step (secrets can't be read directly in `if`).
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      # upload-artifact@v5 still declares Node 20; force the Node 24 runtime so
      # the deprecation warning goes away (per GitHub's guidance).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 '^version:' mobile/pubspec.yaml | sed -E 's/version:[[:space:]]*//' | cut -d'+' -f1)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${VERSION}"

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      # Decode the fixed release keystore from secrets so every build is signed
      # with the same key (stable SHA-1 for Google Sign-In + cross-version OTA
      # updates). When the secret is absent the build falls back to the debug
      # key (see android/app/build.gradle.kts), so forks/PRs still build.
      - name: Configure release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.jks
          cat > key.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: mobile
        run: >-
          flutter build apk --release
          --build-name=${{ steps.version.outputs.version }}
          --build-number=${{ github.run_number }}
          --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_SERVER_CLIENT_ID }}

      # Only needed as a fallback when S3 isn't configured — the APK is normally
      # distributed via S3 below. Skipping it on configured runs also avoids the
      # upload-artifact@v5 Node 20 deprecation warning (no Node 24 release yet).
      - name: Upload APK artifact
        if: ${{ env.S3_ENDPOINT == '' || env.S3_BUCKET == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ai-food-mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to S3
        if: ${{ env.S3_ENDPOINT != '' && env.S3_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
          APK_PATH: mobile/build/app/outputs/flutter-apk/app-release.apk
          RELEASE_NAME: ${{ steps.version.outputs.version }}
        run: |
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/downloads/ai-food-v$RELEASE_NAME.apk" --endpoint-url "$S3_ENDPOINT"
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/downloads/ai-food-latest.apk" --endpoint-url "$S3_ENDPOINT"
