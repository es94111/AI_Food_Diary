# APK 二進位靜態分析（MobSF）。build release APK → 用 MobSF REST API 掃 →
# 報告存成 artifact。目前是「報告模式」：不讓 CI 失敗，先讓你 triage。
# 要改成 gate：把最後的 "Enforce security score" step 取消註解並設門檻。
name: MobSF (APK scan)

on:
  schedule:
    - cron: "0 19 * * *" # 每天 03:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mobsf:
    name: Build & scan APK
    runs-on: self-hosted
    env:
      # Self-hosted runner: point Flutter/Gradle at the pre-installed SDK + JDK
      # (the runner service doesn't source /etc/profile.d or .bashrc).
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      # 固定的本機 API key（只在這個 job 內、對 localhost 的 MobSF 容器用，非機密）。
      MOBSF_API_KEY: ci-local-mobsf-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build release APK
        # 無 keystore secret → 退回 debug key；無 GOOGLE_SERVER_CLIENT_ID → 隱藏登入鈕。
        # 兩者皆不影響靜態掃描。
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release

      - name: Start MobSF
        run: |
          docker run -d --name mobsf -p 8000:8000 \
            -e MOBSF_API_KEY="$MOBSF_API_KEY" \
            opensecurity/mobile-security-framework-mobsf:latest
          echo "Waiting for MobSF to come up..."
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8000/; then
              echo "MobSF is up"; break
            fi
            sleep 5
            if [ "$i" = "60" ]; then echo "MobSF did not start"; docker logs mobsf; exit 1; fi
          done

      - name: Upload & scan APK
        run: |
          APK=mobile/build/app/outputs/flutter-apk/app-release.apk
          ls -lh "$APK"
          HASH=$(curl -sf -F "file=@${APK}" \
                   -H "Authorization: $MOBSF_API_KEY" \
                   http://localhost:8000/api/v1/upload \
                 | python3 -c "import sys,json;print(json.load(sys.stdin)['hash'])")
          echo "Scan hash: $HASH"
          curl -sf -X POST http://localhost:8000/api/v1/scan \
               -H "Authorization: $MOBSF_API_KEY" \
               --data "hash=$HASH" -o mobsf-report.json
          curl -sf -X POST http://localhost:8000/api/v1/download_pdf \
               -H "Authorization: $MOBSF_API_KEY" \
               --data "hash=$HASH" -o mobsf-report.pdf || echo "PDF export skipped"

      - name: Print summary
        run: |
          python3 - <<'PY'
          import json
          try:
              d = json.load(open("mobsf-report.json"))
          except Exception as e:
              print("Could not parse report:", e); raise SystemExit(0)
          appsec = d.get("appsec", {}) or {}
          score = appsec.get("security_score", d.get("security_score", "n/a"))
          print("=== MobSF summary ===")
          print("Security score:", score)
          for sev in ("high", "warning", "info", "secure", "hotspot"):
              items = appsec.get(sev) or []
              print(f"{sev:8}: {len(items)}")
              for it in items[:20]:
                  title = it.get("title") or it.get("name") or it
                  print("   -", title)
          PY

      - name: Upload MobSF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-report
          path: |
            mobsf-report.json
            mobsf-report.pdf
          if-no-files-found: warn

      # ── 想改成 gate：取消註解，掃描分數低於門檻就 fail ──
