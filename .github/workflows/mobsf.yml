      #     score = (d.get("appsec", {}) or {}).get("security_score", 100)
      #     THRESHOLD = 40
      #     print(f"Security score {score} (threshold {THRESHOLD})")
      #     sys.exit(1 if score < THRESHOLD else 0)
      #     PY
