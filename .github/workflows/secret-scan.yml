name: Secret scan (gitleaks)

on:
  schedule:
    - cron: "0 19 * * *" # 每天 03:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # gitleaks-action@v2 fails to download/install its binary on this
      # self-hosted runner ("parameter 'file' is required"), so run the gitleaks
      # CLI via its Docker Hub image instead. `detect` scans the full git
      # history (checkout uses fetch-depth: 0); exits non-zero on any finding.
      - name: Run gitleaks
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect --source=/repo --redact --no-banner
