# private repo 免費 SAST。Semgrep OSS 引擎 + 公開規則集，不需 SEMGREP_APP_TOKEN，
# 有發現就讓 CI 失敗、結果印在 log（不上傳 Security 頁籤，故不需 GHAS）。
name: Semgrep SAST

on:
  schedule:
    - cron: "0 19 * * *" # 每天 03:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Run Semgrep via `docker run` (not a job-level `container:`). A container
      # job on a self-hosted runner checks out as root into the *shared*
      # workspace, leaving root-owned .git files that break every later job's
      # checkout. --user keeps files owned by the runner; HOME=/tmp gives the
      # arbitrary UID a writable home for Semgrep's settings.
      - name: Run Semgrep
        # --error: 有發現就讓 CI 失敗；首次導入太吵可先拿掉（純報告），
        # 或用 .semgrepignore / baseline 只擋新增問題。
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp \
            -v "${{ github.workspace }}:/src" -w /src \
            semgrep/semgrep semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --error \
            --metrics off
