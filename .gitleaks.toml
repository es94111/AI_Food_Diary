title = "Gitleaks config"

[extend]
useDefault = true

# Use the legacy single [allowlist] table, not [[allowlists]]/targetRules.
# gitleaks-action@v2 pins older gitleaks versions (~8.24.x) that ignore the
# newer targetRules syntax, which would make these false-positive exclusions no-op.
[allowlist]
description = "Generated build artifacts contain deterministic hashes that trigger generic-api-key false positives."
paths = [
  '''^\.next/''',
  '''^build/''',
  '''^dist/''',
  '''^out/''',
  '''^mobile/build/''',
  '''^mobile/android/build/''',
  '''^mobile/android/app/build/''',
  '''^tsconfig\.tsbuildinfo$''',
]
